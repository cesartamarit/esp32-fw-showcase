name: Firmware CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (ESP32-S3)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32s3
          command: idf.py build

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: |
            build/esp32-fw-showcase.bin
            build/esp32-fw-showcase.elf
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
          retention-days: 30

  size-check:
    name: Size Analysis
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Build and check size
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: esp32s3
          command: |
            idf.py build
            idf.py size-components > size_report.txt
            cat size_report.txt

      - name: Upload size report
        uses: actions/upload-artifact@v4
        with:
          name: size-report-${{ github.sha }}
          path: size_report.txt

  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=missingInclude \
            -I components/bsp/include \
            -I components/ble_stack/include \
            -I components/ota_manager/include \
            -I components/power_mgr/include \
            components/ main/

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: firmware/

      - name: Rename binaries with version tag
        run: |
          TAG=${GITHUB_REF_NAME}
          mv firmware/esp32-fw-showcase.bin      firmware/esp32-fw-showcase-${TAG}.bin
          mv firmware/esp32-fw-showcase.elf      firmware/esp32-fw-showcase-${TAG}.elf
          mv firmware/bootloader/bootloader.bin  firmware/bootloader-${TAG}.bin
          mv firmware/partition_table/partition-table.bin firmware/partition-table-${TAG}.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: "true"
          files: |
            firmware/esp32-fw-showcase-*.bin
            firmware/esp32-fw-showcase-*.elf
            firmware/bootloader-*.bin
            firmware/partition-table-*.bin
